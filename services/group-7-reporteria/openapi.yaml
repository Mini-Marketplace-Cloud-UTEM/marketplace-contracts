openapi: 3.0.3
info:
  title: Grupo 7 — Reportería, Batch y Streaming
  version: 1.0.0
  description: |
    Contrato oficial de la API REST e Interfaces del Grupo 7 (Reportería, Batch y Streaming).
    Documento corregido de acuerdo con los requerimientos de arquitectura y alineado con las 
    convenciones globales del Mini Marketplace.

servers:
  - url: http://localhost:8070
    description: Desarrollo local
  - url: https://api-reporteria-g7.render.com # (Esto no funciona aun por que no tenemos un render)
    description: Servidor de producción en Render

tags:
  - name: Reports

paths:
  /reports/sales:
    get:
      tags: [Reports]
      summary: Resumen financiero consolidado
      operationId: getSalesReport
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Resumen de ventas del período
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesReport'
        '400':
          $ref: '#/components/responses/BadRequest'

  /reports/orders-by-status:
    get:
      tags: [Reports]
      summary: Conteo de pedidos por estado
      operationId: getOrdersByStatus
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
      responses:
        '200':
          description: Conteo por estado
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderStatusCount'

  /reports/top-products:
    get:
      tags: [Reports]
      summary: Productos más vendidos
      operationId: getTopProducts
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Lista paginada de productos más vendidos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TopProduct'
                  pagination:
                    $ref: '#/components/schemas/Pagination'

  /reports/batch/recalculate:
    post:
      tags: [Reports]
      summary: Forzar recálculo batch (asíncrono)
      operationId: triggerBatchRecalculate
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  format: date
                to:
                  type: string
                  format: date
      responses:
        '202':
          description: Recálculo encolado
          content:
            application/json:
              schema:
                type: object
                properties:
                  jobId:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [QUEUED]

  /reports/average-ticket:
    get:
      tags: [Reports]
      summary: Obtención del ticket promedio de compra
      operationId: getAverageTicket
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
      responses:
        '200':
          description: Ticket promedio calculado del negocio
          content:
            application/json:
              schema:
                type: object
                properties:
                  averageTicket:
                    type: integer
                    example: 49990
                  currency:
                    type: string
                    default: CLP

  /reports/peak-hours:
    get:
      tags: [Reports]
      summary: Análisis de franjas horarias con mayor volumen de transacciones
      operationId: getPeakHours
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
      responses:
        '200':
          description: Distribución horaria de ventas
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    hour:
                      type: integer
                      example: 18
                    orderCount:
                      type: integer
                      example: 42

  /reports/delivery-performance:
    get:
      tags: [Reports]
      summary: Tiempos promedio de entrega (Lead Time)
      operationId: getDeliveryPerformance
      parameters:
        - $ref: '#/components/parameters/XRequestId'
        - $ref: '#/components/parameters/XCorrelationId'
        - $ref: '#/components/parameters/XConsumer'
      responses:
        '200':
          description: Métricas de rendimiento de despacho consolidadas
          content:
            application/json:
              schema:
                type: object
                properties:
                  avgDeliveryTimeMinutes:
                    type: integer
                    example: 120
                  totalDeliveredCount:
                    type: integer
                    example: 154

components:
  parameters:
    XRequestId:
      name: X-Request-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XCorrelationId:
      name: X-Correlation-Id
      in: header
      required: true
      schema:
        type: string
        format: uuid
    XConsumer:
      name: X-Consumer
      in: header
      required: true
      schema:
        type: string
        example: group-01
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Estructura de petición inválida o malformada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    OrderId:
      type: string
      pattern: '^ORD-(\d{4}|\d{8}-\d{3,})$'
      example: "ORD-1001"

    SalesReport:
      type: object
      properties:
        period:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        totalSales:
          type: integer
        totalOrders:
          type: integer
        currency:
          type: string
          enum: [CLP]
          default: CLP

    OrderStatusCount:
      type: object
      properties:
        status:
          type: string
        count:
          type: integer

    TopProduct:
      type: object
      properties:
        productId:
          type: string
          example: "P-100"
        name:
          type: string
        unitsSold:
          type: integer
        revenue:
          type: integer

    Pagination:
      type: object
      properties:
        totalItems:
          type: integer
        totalPages:
          type: integer
        currentPage:
          type: integer
        pageSize:
          type: integer

    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        code:
          type: string
        message:
          type: string
        correlationId:
          type: string
          format: uuid

x-events:
  consumed:
    - eventType: OrderCreated
      from: Grupo 5
    - eventType: PaymentApproved
      from: Grupo 8
    - eventType: InventoryShortage
      from: Grupo 4
    - eventType: ShipmentDelivered
      from: Grupo 6
      note: >
        Normalizar las estructuras de datos y marcas temporales internas 
        recibidas en snake_case para mantener la consistencia del dominio analítico.
